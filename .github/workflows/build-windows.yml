name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Windows Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native node modules
        run: npm rebuild

      - name: Build frontend
        run: npm run build

      - name: Build electron
        run: npm run build:electron

      - name: Build native module (Windows)
        run: |
          echo Building Windows native module...
          npm run build:native

      - name: Build EXE
        run: npm run dist

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/**
